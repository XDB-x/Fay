
[key]
#funasr / ali / sensevoice
#建议使用funasr,请依照asr/funasr/README>md的说明启动
ASR_mode= funasr
#ASR二选一（需要运行fay/test/funasr服务）集成达摩院asr项目、感谢中科大脑算法工程师张聪聪提供集成代码
local_asr_ip=127.0.0.1
local_asr_port=10197

# ASR二选一（第1次运行建议用这个，免费3个月）， 阿里云 实时语音识别 服务密钥（必须）https://ai.aliyun.com/nls/trans
ali_nls_key_id=你的阿里云AccessKey_ID
ali_nls_key_secret=你的阿里云AccessKey_Secret
ali_nls_app_key=你的阿里云AppKey



#tts类型（切换请重新选择所需要的声音）azure、ali、gptsovits、volcano、gptsovits_v3、moss、qwen、cosyvoice
tts_module=cosyvoice

# 微软 文字转语音 服务密钥（非必须，使用可产生不同情绪的音频）https://azure.microsoft.com/zh-cn/services/cognitive-services/text-to-speech/
ms_tts_key=
ms_tts_region=

# 阿里云 文字转语音 服务密钥 https://ai.aliyun.com/nls/trans
ali_tss_key_id=
ali_tss_key_secret=
ali_tss_app_key=

# Qwen-TTS Realtime（使用 tts_module=qwen 时填写）
qwen_tts_model=qwen3-tts-flash-realtime
qwen_tts_voice=Neil
qwen_tts_api_key=你的Qwen_TTS_API_Key
qwen_tts_workspace_id=你的Qwen_Workspace_ID
qwen_tts_region=cn-beijing
qwen_tts_timeout_seconds=30

# MOSS-TTS-Nano local ONNX CPU
moss_tts_backend=realtime
moss_tts_base_url=http://192.168.2.60:18084
moss_tts_prompt_audio=/data/moss/assets/audio/zh_1.wav
moss_tts_timeout_seconds=120
moss_tts_cpu_threads=4

# CosyVoice3 FastAPI zero-shot TTS
cosyvoice_base_url=http://127.0.0.1:50000
cosyvoice_prompt_audio=assets/voices/news-female.wav
cosyvoice_prompt_text=You are a helpful assistant.<|endofprompt|>会议强调，开展知识产权综合管理改革试点。
cosyvoice_timeout_seconds=120
cosyvoice_voice_map=assets/voices/cosyvoice_voices.json
cosyvoice_default_voice=cosy-news-female
# WebSocket 文本流必须使用 zero_shot，避免 instruct2 将提示词播报出来；instruct2 仅供非流式 HTTP 使用
cosyvoice_mode=zero_shot
# 仅在 cosyvoice_stream_mode=http 且 cosyvoice_mode=instruct2 时生效
cosyvoice_instruct_text=请以正式电视新闻主播的普通话播报风格朗读。语调庄重、平稳、克制、权威，字正腔圆，咬字清晰，停连规范；避免聊天感、亲和感、活泼感、撒娇感和夸张情绪。
# 模型生成侧语速；前端播放速度仍由 FloodAgent 的 fay.playback-rate 控制
cosyvoice_speed=1.05
# http 为当前回退模式；websocket 需先部署新版 Linux server.py
cosyvoice_stream_mode=websocket
cosyvoice_ws_url=ws://127.0.0.1:50000/ws/tts

# Doubao-语音合成 服务密钥 https://www.volcengine.com/product/voice-tech
volcano_tts_appid=
volcano_tts_access_token=
volcano_tts_cluster=volcano_tts
#可为空，为空时读取选择的音色
volcano_tts_voice_type=

#key
#小模型（日常对话/工具编排使用）api key
gpt_api_key=ollama
#小模型 base url 如：https://api.openai.com/v1、https://rwkv.ai-creator.net/chntuned/v1、https://api.fastgpt.in/api/v1、https://api.moonshot.cn/v1
gpt_base_url=http://192.168.2.60:11434/v1
#小模型 model engine 如：glm4、deepseek、qwen3-4b等
gpt_model_engine=qwen3.6:35b-a3b

#大模型（复杂推理/核实场景使用，未配置时降级为小模型）
#大模型 model engine 如：MiniMax-M2.7、gpt-4o、deepseek-r1等
big_model_engine=qwen3.6:35b-a3b
#大模型 base url（留空则复用小模型的 gpt_base_url）
big_model_base_url=http://192.168.2.60:11434/v1
#大模型 api key（留空则复用小模型的 gpt_api_key）
big_model_api_key=ollama

# Embedding 模型配置
# Embedding 模型名称，如 text-embedding-qwen3-embedding-0.6b、BAAI/bge-large-zh-v1.5
embedding_api_model=
# Embedding 服务 base url（可单独配置；留空则复用小模型的 gpt_base_url，key 始终复用 gpt_api_key）
embedding_base_url=

#gpt(fastgpt)代理(可为空，填写例子：127.0.0.1:7890)
proxy_config=

#启动模式common、web（服务器或docker请使用web方式，通过http://127.0.0.1:5000控制）
start_mode=web

#服务器主动地址
fay_url=http://127.0.0.1:5000
